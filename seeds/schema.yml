version: 2

# ── Seeds ─────────────────────────────────────────────────────────────────────
# Column types are enforced in dbt_project.yml seed config.
# Descriptions here feed the dbt docs lineage graph.

seeds:
  - name: raw_customers
    description: >
      Raw customer master records for a mid-size UK motor insurer.
      Generated by scripts/generate_data.py.
      20% of customers have updated_at > created_at, indicating an address or
      phone number change. These records drive SCD Type 1 snapshot behaviour.
    columns:
      - name: customer_id
        description: Surrogate UUID primary key for the customer.
        tests:
          - not_null
          - unique

      - name: first_name
        description: Customer's first (given) name.
        tests:
          - not_null

      - name: last_name
        description: Customer's family name.
        tests:
          - not_null

      - name: email
        description: Customer email address.
        tests:
          - not_null
          - unique

      - name: phone
        description: Customer phone number (UK format).

      - name: address_line_1
        description: First line of the customer's registered address.

      - name: city
        description: City of the customer's registered address.

      - name: postcode
        description: UK postcode of the customer's registered address.

      - name: date_of_birth
        description: Customer date of birth (YYYY-MM-DD).
        tests:
          - not_null

      - name: licence_years
        description: Number of years the customer has held a driving licence.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 60

      - name: created_at
        description: Timestamp when the customer record was first created.
        tests:
          - not_null

      - name: updated_at
        description: >
          Timestamp when the customer record was last updated.
          Equals created_at for customers with no changes.
          For 20% of customers this is later than created_at, indicating an
          address or phone change — the trigger for SCD Type 1.
        tests:
          - not_null

  - name: raw_policies
    description: >
      Raw policy records. One row per policy version.
      Renewal rows share the same policy_number (the stable SCD key) but carry
      a new policy_id, an incremented no_claims_discount, and a recalculated
      annual_premium. These renewal rows drive SCD Type 2 on scd_policies.
      Annual premium is deterministically calculated from vehicle_value,
      cover_type, and no_claims_discount, making the data internally consistent.
    columns:
      - name: policy_id
        description: >
          UUID unique to this specific policy version (row).
          A new UUID is generated for each renewal.
        tests:
          - not_null
          - unique

      - name: policy_number
        description: >
          Stable policy identifier that persists across renewals.
          Used as the unique_key in the scd_policies snapshot.
          A policy_number with more than one row in this table indicates a
          policy that has been renewed — the SCD Type 2 scenario.
        tests:
          - not_null

      - name: customer_id
        description: Foreign key to raw_customers.customer_id.
        tests:
          - not_null
          - relationships:
              to: ref('raw_customers')
              field: customer_id

      - name: cover_type
        description: Type of motor insurance cover.
        tests:
          - not_null
          - accepted_values:
              values: ["comprehensive", "third_party_fire_theft", "third_party"]

      - name: vehicle_make
        description: Manufacturer of the insured vehicle.
        tests:
          - not_null

      - name: vehicle_model
        description: Model name of the insured vehicle.
        tests:
          - not_null

      - name: vehicle_registration_year
        description: Year the vehicle was first registered.

      - name: vehicle_value
        description: Declared value of the insured vehicle in GBP.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 500
              max_value: 200000

      - name: annual_premium
        description: Annual insurance premium in GBP.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 50000

      - name: no_claims_discount
        description: Number of years of no-claims discount (0–9).
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 9

      - name: start_date
        description: Policy inception date.
        tests:
          - not_null

      - name: end_date
        description: Policy expiry date.
        tests:
          - not_null

      - name: policy_status
        description: Current status of this policy version.
        tests:
          - not_null
          - accepted_values:
              values: ["active", "expired", "cancelled"]

      - name: created_at
        description: Timestamp when this policy row was created.
        tests:
          - not_null

      - name: updated_at
        description: >
          Timestamp of the last update. Used as the updated_at column in the
          scd_policies snapshot (timestamp strategy). Renewal rows carry a
          later updated_at than the original, triggering SCD Type 2 versioning.
        tests:
          - not_null

  - name: raw_claims
    description: >
      Raw insurance claim records. One row per claim.
      Claims join to policies on policy_id (the specific version the claim was
      filed against). Comprehensive policies are 3x more likely to generate
      claims than third party policies.
    columns:
      - name: claim_id
        description: UUID primary key for the claim.
        tests:
          - not_null
          - unique

      - name: policy_id
        description: Foreign key to raw_policies.policy_id.
        tests:
          - not_null
          - relationships:
              to: ref('raw_policies')
              field: policy_id

      - name: policy_number
        description: >
          Stable policy number, denormalised from policies for convenience.
          Allows joining claims to the policy history in scd_policies.

      - name: claim_type
        description: Nature of the claim event.
        tests:
          - not_null
          - accepted_values:
              values: ["accident", "theft", "fire", "windscreen", "weather"]

      - name: claim_date
        description: Date the claim was reported.
        tests:
          - not_null

      - name: claim_amount
        description: >
          Amount claimed in GBP. For settled claims, the singular test
          assert_claim_amount_within_vehicle_value ensures this does not exceed
          the insured vehicle value.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 200000

      - name: claim_status
        description: Current status of the claim.
        tests:
          - not_null
          - accepted_values:
              values: ["settled", "open", "rejected"]

      - name: days_to_settle
        description: >
          Number of days from claim_date to settlement. Null for open and
          rejected claims.

      - name: created_at
        description: Timestamp when the claim record was created.
        tests:
          - not_null

      - name: updated_at
        description: Timestamp when the claim record was last updated.
        tests:
          - not_null
