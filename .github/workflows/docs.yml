name: Docs — Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write   # Required by peaceiris/actions-gh-pages to push to gh-pages branch

jobs:
  deploy-docs:
    name: Full Pipeline + dbt Docs Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Install dependencies ──────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            dbt-core==1.8.7 \
            dbt-duckdb==1.8.4 \
            duckdb==1.0.0 \
            faker==26.0.0 \
            pandas==2.2.2 \
            numpy==1.26.4

      # ── Install dbt packages ──────────────────────────────────────────────────
      - name: Install dbt packages
        run: dbt deps --profiles-dir .

      # ── Full pipeline run ─────────────────────────────────────────────────────
      - name: Generate synthetic data
        run: python scripts/generate_data.py

      - name: dbt seed
        run: dbt seed --profiles-dir .

      - name: dbt build staging views
        run: dbt build --select staging --profiles-dir .

      - name: dbt snapshot
        run: dbt snapshot --profiles-dir .

      - name: dbt build — full pipeline
        run: dbt build --profiles-dir .

      - name: dbt test — all tests
        run: dbt test --profiles-dir .

      # ── Generate documentation ────────────────────────────────────────────────
      # dbt docs generate writes 4 files to target/:
      #   index.html, catalog.json, manifest.json, run_results.json
      - name: dbt docs generate
        run: dbt docs generate --profiles-dir .

      # ── Deploy to GitHub Pages ────────────────────────────────────────────────
      # Publishes target/ to the gh-pages branch, making the lineage graph
      # and data catalogue available at:
      #   https://<username>.github.io/<repo-name>/
      #
      # To enable GitHub Pages:
      #   1. Repo Settings → Pages → Source: Deploy from branch
      #   2. Branch: gh-pages, Folder: / (root)
      #   3. Save — the URL will appear at the top of the Pages settings page
      - name: Deploy docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target
          publish_branch: gh-pages
          commit_message: "docs: deploy dbt docs from ${{ github.sha }}"
          enable_jekyll: false

      # ── Save production manifest for slim CI ─────────────────────────────────
      # Upload the manifest.json as a named artifact so the CI workflow can
      # use it for state:modified+ comparisons in future (full slim CI).
      - name: Upload production manifest
        uses: actions/upload-artifact@v4
        with:
          name: prod-manifest
          path: target/manifest.json
          retention-days: 30
