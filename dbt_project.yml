name: 'datavault'
version: '1.0.0'

profile: 'datavault'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ─── Project Variables ────────────────────────────────────────────────────────
# Configurable without touching any model SQL.
# Override at runtime: dbt build --vars '{"renewal_lookahead_days": 60}'
vars:
  renewal_lookahead_days: 30          # Days ahead to flag active policies for renewal
  risk_high_claim_threshold: 3        # Min lifetime claims to qualify as high risk
  risk_high_value_threshold: 10000    # Min lifetime claim value (£) for high risk band

# ─── Model Configuration ──────────────────────────────────────────────────────
models:
  datavault:
    staging:
      +materialized: view
      +schema: staging
      +docs:
        node_color: "#3B82F6"   # Blue – bronze layer
    intermediate:
      +materialized: table
      +schema: intermediate
      +docs:
        node_color: "#8B5CF6"   # Purple – silver layer
    marts:
      +materialized: table
      +schema: marts
      +docs:
        node_color: "#10B981"   # Green – gold layer

# ─── Snapshot Configuration ───────────────────────────────────────────────────
snapshots:
  datavault:
    +target_schema: snapshots

# ─── Seed Configuration ───────────────────────────────────────────────────────
seeds:
  datavault:
    +schema: raw
    raw_customers:
      +column_types:
        customer_id: varchar
        date_of_birth: date
        licence_years: integer
        created_at: timestamp
        updated_at: timestamp
    raw_policies:
      +column_types:
        policy_id: varchar
        policy_number: varchar
        customer_id: varchar
        vehicle_value: double
        annual_premium: double
        no_claims_discount: integer
        start_date: date
        end_date: date
        created_at: timestamp
        updated_at: timestamp
    raw_claims:
      +column_types:
        claim_id: varchar
        policy_id: varchar
        claim_amount: double
        claim_date: date
        days_to_settle: integer
        created_at: timestamp
        updated_at: timestamp
